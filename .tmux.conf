
#
# 基本設定
#

# prefixキーを C-b から C-a に変更する
unbind C-b
set -g prefix C-a
# C-a を二度打ちで下位アプリ (Claude Code --resume セレクタ等) へ透過
bind C-a send-prefix

# ウィンドウとペインの番号を1始まりにする
set-option -g base-index 1
set-window-option -g pane-base-index 1

# ウィンドウを閉じたときに番号を詰める
set -g renumber-windows on

# ウィンドウ履歴の最大行数
set-option -g history-limit 5000

# Escキーの入力遅延を最小化する（vim等でEscが効きやすくなる）
set -s escape-time 1

# マウス操作を無効化（スクロール、ペイン選択など）
set -g mouse off

# 複数クライアント接続時に各ウィンドウを最大サイズにリサイズ
setw -g aggressive-resize on

# フォーカスイベントをアプリに伝達する（IME再関連付けのために重要）
set -g focus-events on

# WSL2でChere（右クリックでここで開く）を有効にする
set-environment -g CHERE_INVOKING 1


#
# キーバインド（ウィンドウ・ペイン操作）
#

# Prefix + r で設定ファイルをリロードする
bind-key r source-file ~/.tmux.conf \; display "Reloaded!"

# Prefix+- で横に、Prefix+| で縦に分割（ペイン）する
bind-key | split-window -h
bind-key - split-window -v

# Prefix + Ctrl-h/l でウィンドウを連続切り替えできる
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

# ペインの移動をvi風にする（h/j/k/l）
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# ペインのリサイズをvi風にする（Ctrl + h/j/k/l）
bind-key -r C-h resize-pane -L 10
bind-key -r C-l resize-pane -R 10
bind-key -r C-j resize-pane -D 10
bind-key -r C-k resize-pane -U 10


#
# コピーモード
#

# コピーモードのキーバインドをvi風にする
set-window-option -g mode-keys vi

# Prefix + Space でコピーモード開始、Prefix + p でペースト
bind-key Space copy-mode
bind-key p paste-buffer

# vでマーク開始
bind-key -T copy-mode-vi v     send-keys -X begin-selection
# Rで矩形選択トグル（Windows Terminalに C-v を奪われるため代替キー）
bind-key -T copy-mode-vi R     send-keys -X rectangle-toggle
# yでヤンク（クリップボードにコピー）
bind-key -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "win32yank.exe -i --crlf"

# Enterでもヤンク
unbind-key -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "win32yank.exe -i --crlf"


#
# 外観
#

## tmux-themepack
set -g @themepack 'powerline/default/green'

# ステータスバーの更新間隔と自動リネーム設定
set-option -g status-interval 1
set-option -g automatic-rename on
# bash / claude コマンド用（pane_id を渡す）
set-option -g automatic-rename-format \
  '#{?#{==:#{pane_current_command},bash},#(~/dotfiles/bin/window-title.sh "#{pane_current_path}" "#{pane_id}" "" "#{pane_pid}"),#{?#{==:#{pane_current_command},claude},#(~/dotfiles/bin/window-title.sh "#{pane_current_path}" "#{pane_id}" claude "#{pane_pid}"),#{pane_current_command}}}'

# ペインボーダーにカレントディレクトリとgitブランチ名を表示
set -g pane-border-status top
set -g pane-border-format \
  ' #{pane_current_path} #(git -C #{pane_current_path} branch --show-current 2>/dev/null) '


#
# ポップアップ
#

# Prefix + y で新しいウィンドウを作成して claude を起動
bind -r y new-window -c "#{pane_current_path}" "claude"

# Prefix + e でウィンドウに紐づいた bash セッションをポップアップで開く（セッション復元対応）
# Prefix + E は同じセッションを最大化（100%）で開き直す
bind -r e run-shell '\
  SESSION="bash-popup-#{window_id}"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
    tmux new-session -d -s "$SESSION" -c "#{pane_current_path}"; \
  tmux display-popup -w85% -h85% -E "tmux attach-session -t $SESSION"'
bind -r E run-shell '\
  SESSION="bash-popup-#{window_id}"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
    tmux new-session -d -s "$SESSION" -c "#{pane_current_path}"; \
  tmux display-popup -w100% -h100% -E "tmux attach-session -t $SESSION"'


#
# 端末・IME 設定
#

# より豊富な cursor reporting capability を持つ terminfo を使用
set -g default-terminal "tmux-256color"

# カーソル形状変更を Windows Terminal へ伝搬（vim, emacs などのカーソル変化を外側ターミナルへ通知）
set -as terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'
# True Color サポート
set -as terminal-overrides ',xterm-256color:Tc'
set -as terminal-overrides ',tmux-256color:Tc'

# 拡張キーエンコーディング（Kitty keyboard protocol）
# Ctrl+[, Shift+Enter など同一ESCシーケンスのキーを区別
set -g extended-keys on

# Synchronized Output（CSI ? 2026 h/l）のサポートを有効化
# レンダリングのちらつきを抑え、IME候補ウィンドウの描画安定性を向上
set -as terminal-features ',*:sync'

# DCS/OSC パススルー（Neovim 等の高度な端末機能を tmux 越しに使用、3.3a+ 必要）
set -g allow-passthrough on


#
# シェル設定
#

## デフォルトのSHELLの設定
set-option -g default-shell "${SHELL}"
set -g default-command "${SHELL}"


#
# プラグイン（TPM）
#

## List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'jimeh/tmux-themepack'

## Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# 現在選択中のウィンドウを太字・白文字で強調（非選択はデフォルトの黒文字）
set -g window-status-current-style 'bold,bg=black,fg=green'

# status-right: 時刻表示 + Prefix/モードインジケーター
# 注意: #[fg=..,bg=..] のカンマが #{?..} の区切り文字と誤解析されるため、#[] を分割して書く
set -g status-right '#{?client_prefix,#[fg=colour255]#[bg=colour160]#[bold] PREFIX #[default],}#{?pane_in_mode,#[fg=colour255]#[bg=colour26]#[bold] #{pane_mode} #[default],} %m/%d(%a) %H:%M#(~/dotfiles/bin/refresh-window-titles.sh)'
