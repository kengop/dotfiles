# 設定ファイルをリロードする
bind-key r source-file ~/.tmux.conf \; display "Reloaded!"

# prefixキーを変更する
unbind C-b
set -g prefix C-a

set-environment -g CHERE_INVOKING 1

# peneの開始番号
set-option -g base-index 1
set-window-option -g pane-base-index 1

# Prefix+- で横に、Prefix+| で縦に分割（ペイン）する
bind-key | split-window -h
bind-key - split-window -v

# Prefix + Ctrl-h,h,h,h,...と連打できる
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

# ウィンドウ履歴の最大行数
set-option -g history-limit 5000

# コピーモードのキーバインドをvi風にする
set-window-option -g mode-keys vi
#bind-key -t vi-copy v begin-selection

# ウィンドウのインデックスを1から始める
set -g base-index 1

# ペインの移動をvi風にする
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# ペインのリサイズをvi風にする
bind-key -r C-h resize-pane -L 10
bind-key -r C-l resize-pane -R 10
bind-key -r C-j resize-pane -D 10
bind-key -r C-k resize-pane -U 10


#
# キーバインド（コピーモード）
#
bind-key Space copy-mode
bind-key p paste-buffer

# vでマーク開始
bind-key -T copy-mode-vi v     send-keys -X begin-selection
bind-key -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"

unbind-key -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"

# Vで行の先頭からマーク開始
#bind-key -t vi-copy V select-line

# C-vで矩形選択の切り替え
#bind-key -t vi-copy C-v rectangle-toggle

# yでヤンク
#bind-key -t vi-copy y copy-selection

# Yで1行ヤンク
#bind-key -t vi-copy Y copy-line

#
# 外観
#
## tmux-themepack
set -g @themepack 'powerline/default/green'

#
# その他
#

# 下記の設定をしておいたほうがEscの効きがいいらしい
set -s escape-time 1

# フォーカスイベントをアプリに伝達する（IME再関連付けのために重要）
set -g focus-events on

# IMEカーソル追従改善のための設定（Windows Terminal + WSL2 + tmux 3.5a+）

# より豊富な cursor reporting capability を持つ terminfo を使用
set -g default-terminal "tmux-256color"

# カーソル形状変更を Windows Terminal へ伝搬（vim, emacs などのカーソル変化を外側ターミナルへ通知）
set -as terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'
# True Color サポート
set -as terminal-overrides ',xterm-256color:Tc'
set -as terminal-overrides ',tmux-256color:Tc'

# 拡張キーエンコーディング（Kitty keyboard protocol）
# Ctrl+[, Shift+Enter など同一ESCシーケンスのキーを区別
set -g extended-keys on

# Synchronized Output（CSI ? 2026 h/l）のサポートを有効化
# レンダリングのちらつきを抑え、IME候補ウィンドウの描画安定性を向上
set -as terminal-features ',*:sync'

# DCS/OSC パススルー（Neovim 等の高度な端末機能を tmux 越しに使用、3.3a+ 必要）
set -g allow-passthrough on

## デフォルトのSHELLの設定
set-option -g default-shell "${SHELL}"
set -g default-command "${SHELL}"

# TMUX plugin manager config
## List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'jimeh/tmux-themepack'

## Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
